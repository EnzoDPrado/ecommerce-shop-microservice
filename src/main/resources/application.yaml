spring:
  application:
    name: shop
  datasource:
    url: jdbc:postgresql://localhost:5432/shop_db
    username: shop
    password: root-shop-123
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: CHTHikariPool
      minimum-idle: 1
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 10000000
      connection-test-query: SELECT 1
      leak-detection-threshold: 2000
  flyway:
    enabled: true
    locations: classpath:db.migration
    baseline-on-migrate: true
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
api:
  security:
    token:
      secret: ${JWT_SECRET:secret19339120}
      issuer: ${JWT_ISSUER:secret19339120}
server:
  port: 8080
springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-config:
    responses:
      error:
        401: "Invalid credentials"
        400: "Problem with the data in the request"
        403: "Request violates some authorization rule"
        404: "Resource requested not found"
        409: "Duplicated Resource"
        422: "Request violates some business rule"
        500: "Some unexpected error has occurred"
        502: "Service is unavailable at the moment"

