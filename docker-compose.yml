services:
  postgres:
    image: postgres:15
    container_name: shop_db
    environment:
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: root-shop-123
      POSTGRES_DB: shop_db
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - postgres_network

volumes:
  postgres_data:

networks:
  postgres_network:
    driver: bridge
